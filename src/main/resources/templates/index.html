<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalHub - Welcome</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: #f8fafc; color: #0f172a; display: flex; flex-direction: column; min-height: 100vh; }
        .navbar { background-color: #0f172a; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-size: 1.25rem; font-weight: 700; color: #0ea5e9; text-decoration: none; }
        .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        h1 { font-size: 3rem; margin-bottom: 1rem; color: #0f172a; }
        p { color: #64748b; font-size: 1.2rem; margin-bottom: 2rem; max-width: 600px; }
        .btn { background-color: #0ea5e9; color: white; padding: 0.75rem 1.5rem; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 1.1rem; transition: background-color 0.2s; }
        .btn:hover { background-color: #0284c7; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#" class="nav-logo">🦷 DentalHub</a>
</nav>

<div class="hero">
    <h1>Welcome to DentalHub</h1>
    <p>Your professional Dental Appointment Management System. Easily book slots, coordinate treatment plans, and view clinical histories.</p>
    <a href="/appointments/book" class="btn">Enter Booking System</a>
</div>

</body>
</html>
