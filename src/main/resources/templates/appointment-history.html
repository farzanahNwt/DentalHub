<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DentalHub - Appointment History</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 40px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #34495e; color: white; }
        .status { font-weight: bold; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .status-pending { background-color: #ffeaa7; color: #d63031; }
        .status-completed { background-color: #55efc4; color: #00b894; }
        .btn-view { background: #3498db; color: white; padding: 6px 12px; text-decoration: none; border-radius: 4px; font-size: 13px; }
        .btn-book { display: inline-block; background: #2ecc71; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Your Appointment History</h2>
    <a th:href="@{/appointments/book}" class="btn-book">+ Book New Appointment</a>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Time</th>
            <th>Treatment</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="appt : ${history}">
            <td th:text="${appt.appointmentId}">1</td>
            <td th:text="${appt.appointmentDate}">2026-06-15</td>
            <td th:text="${appt.appointmentTime}">10:00 AM</td>
            <td th:text="${appt.treatmentType}">SCALING</td>
            <td>
                    <span th:text="${appt.status}"
                          th:class="${appt.status == 'PENDING' ? 'status status-pending' : 'status status-completed'}">PENDING</span>
            </td>
            <td>
                <a th:href="@{/appointments/details(id=${appt.appointmentId})}" class="btn-view">View Details</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(history)}">
            <td colspan="6" style="text-align: center; color: #7f8c8d;">No appointments found.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
