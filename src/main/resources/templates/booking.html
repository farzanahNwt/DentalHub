<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DentalHub - Book Appointment</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 40px; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 0 auto; }
        h2 { color: #2c3e50; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h2>Book an Appointment</h2>
    <form th:action="@{/appointments/book}" th:object="${appointment}" method="post">

        <div class="form-group">
            <label>Patient ID:</label>
            <input type="number" th:field="*{patientId}" placeholder="Enter Patient ID (e.g., 1)" required />
        </div>

        <div class="form-group">
            <label>Select Dentist ID:</label>
            <input type="number" th:field="*{dentistId}" placeholder="Enter Dentist ID (e.g., 1)" required />
        </div>

        <div class="form-group">
            <label>Appointment Date:</label>
            <input type="date" th:field="*{appointmentDate}" required />
        </div>

        <div class="form-group">
            <label>Preferred Time Slot:</label>
            <select th:field="*{appointmentTime}">
                <option value="09:00 AM">09:00 AM</option>
                <option value="10:30 AM">10:30 AM</option>
                <option value="02:00 PM">02:00 PM</option>
                <option value="03:30 PM">03:30 PM</option>
            </select>
        </div>

        <div class="form-group">
            <label>Treatment Type:</label>
            <select th:field="*{treatmentType}">
                <option value="CHECKUP">Checkup</option>
                <option value="SCALING">Scaling</option>
                <option value="FILLING">Filling</option>
                <option value="EXTRACTION">Extraction</option>
            </select>
        </div>

        <div class="form-group">
            <label>Additional Notes:</label>
            <textarea th:field="*{notes}" rows="3" placeholder="Any symptoms or medical alerts..."></textarea>
        </div>

        <button type="submit">Confirm Booking</button>
    </form>
</div>

</body>
</html>
