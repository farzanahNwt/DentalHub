<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DentalHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f5f0eb;
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .register-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .register-card {
            background: #ffffff;
            border-radius: 1.25rem;
            padding: 40px 36px;
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.07);
        }

        .logo-circle {
            width: 64px;
            height: 64px;
            background-color: #0d3d8f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .logo-circle svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .register-card h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1c1b1b;
            margin: 0 0 6px;
            text-align: center;
        }

        .register-card .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin: 0 0 28px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 0.6rem;
            font-size: 15px;
            color: #1c1b1b;
            background: #fafafa;
            box-sizing: border-box;
            transition: border-color 0.2s;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus {
            border-color: #0056b3;
            background: #fff;
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .terms-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 20px;
        }

        .terms-group input[type="checkbox"] {
            margin-top: 3px;
            width: 16px;
            height: 16px;
            accent-color: #0d3d8f;
            flex-shrink: 0;
            cursor: pointer;
        }

        .terms-group label {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.5;
            cursor: pointer;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background-color: #0d3d8f;
            color: white;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 0.6rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.2s;
        }

        .btn-register:hover {
            background-color: #0a3070;
        }

        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            border-radius: 0.5rem;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #15803d;
            border-radius: 0.5rem;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .login-link {
            font-size: 14px;
            color: #6b7280;
            text-align: center;
            margin: 20px 0 0;
        }

        .login-link a {
            color: #0056b3;
            font-weight: 500;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
<div class="register-wrapper">
    <div class="register-card">

        <!-- Logo -->
        <div class="logo-circle">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C9.5 2 7.5 3.5 6.5 5.5C5.2 5.2 3 6 3 8.5C3 10.5 4.2 11.8 5 12.3C5 15 5.5 19 8 21C9 22 10 22 10.5 21C11 20 11 18.5 12 18.5C13 18.5 13 20 13.5 21C14 22 15 22 16 21C18.5 19 19 15 19 12.3C19.8 11.8 21 10.5 21 8.5C21 6 18.8 5.2 17.5 5.5C16.5 3.5 14.5 2 12 2Z"/>
            </svg>
        </div>

        <h1>DentalHub</h1>
        <p class="subtitle">Create your patient account</p>

        <form th:action="@{/patients/register}" method="post" th:object="${patient}">

            <p th:if="${error}" th:text="${error}" class="error"></p>
            <p th:if="${success}" th:text="${success}" class="success"></p>

            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" th:field="*{fullName}" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" th:field="*{email}" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="phoneNumber">Phone Number</label>
                <input type="text" id="phoneNumber" th:field="*{phoneNumber}" placeholder="+60 12-3456789" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" placeholder="Enter password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            </div>

            <div class="terms-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
            </div>

            <button type="submit" class="btn-register">Register</button>
        </form>

        <p class="login-link">Already have an account? <a th:href="@{/patients/login}">Login here</a></p>
    </div>

    <p class="footer-text">© 2026 DentalHub. All rights reserved.</p>
</div>
</body>
</html>
